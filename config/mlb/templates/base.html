{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Homebase</title>
    <link rel="icon" type="image/png" href="{% static 'mlb/images/homebase-icon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Chivo+Mono:wght@400;500;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid page-wrap py-2">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <img src="{% static 'images/homebase-logo.png' %}" alt="Homebase" style="height: 42px; width: auto;">
        </a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav ms-auto align-items-center gap-3">
                <li class="nav-item"><a class="nav-link text-white" href="{% url 'standings' %}">Standings</a></li>
                <li class="nav-item dropdown teams-dropdown">
                    <a class="nav-link dropdown-toggle text-white" href="#" data-bs-toggle="dropdown">Teams</a>
                    <div class="dropdown-menu teams-menu">
                        <div class="row g-0 team-grid">
                            {% for team in teams %}
                            <div class="col-4">
                                <a href="{% url 'team_page' team.id %}">
                                    <img src="https://www.mlbstatic.com/team-logos/{{ team.id }}.svg"
                                         alt="{{ team.abbreviation }}">
                                    <span>{{ team.abbreviation }}</span>
                                </a>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </li>
                <li class="nav-item"><a class="nav-link text-white" href="{% url 'leaders_page' %}">Leaders</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-wrap">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
